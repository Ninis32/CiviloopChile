<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Reciclaje</title>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="logo">♻️</div>

    <h1>CiviLoop <span>Chile</span></h1>

    <p class="subtitulo">
        Registra tu reciclaje
    </p>

    <form>

        <label>Tipo de Material</label>
        <select>
            <option>Seleccione</option>
            <option>Plástico</option>
            <option>Vidrio</option>
            <option>Papel</option>
            <option>Cartón</option>
            <option>Metal</option>
        </select>

        <label>Cantidad (Kg)</label>
        <input type="number" placeholder="Ej: 2">

        <label>Punto Limpio</label>
        <select>
            <option>Seleccione</option>
            <option>Punto Limpio Santiago Centro</option>
            <option>Punto Limpio Providencia</option>
            <option>Punto Limpio Maipú</option>
        </select>

        <label>Código QR</label>
        <input type="text" placeholder="QR-00001">

        <label>Observaciones</label>
        <textarea placeholder="Comentario opcional"></textarea>

        <button class="btn-login">
            Registrar Reciclaje
        </button>

    </form>

</div>

</body>
</html>
