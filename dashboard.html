<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – CiviLoop Chile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .btn-editar {
      background: none;
      border: 1px solid #2E8B57;
      color: #2E8B57;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-editar:hover { background: #e8f5e9; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
    }
    .modal h3 { color: #1A5C35; margin-bottom: 1rem; font-size: 1rem; }
    .modal label { display: block; font-size: 0.82rem; color: #555; margin-top: 10px; margin-bottom: 3px; }
    .modal select, .modal input, .modal textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
    }
    .modal-btns { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
    .btn-cancelar {
      padding: 0.5rem 1rem;
      background: #f5f5f5;
      color: #666;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-guardar {
      padding: 0.5rem 1rem;
      background: #2E8B57;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1A5C35;
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      display: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="logo">♻️</div>
  <h1>CiviLoop <span>Chile</span></h1>

  <p class="subtitulo" id="saludo">Cargando...</p>

  <div class="puntos-box">
    <h2 id="puntos-display">— puntos</h2>
  </div>

  <nav style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:1rem 0">
    <a href="registrar_reciclaje.html" class="btn-login" style="text-decoration:none;font-size:0.85rem;padding:0.5rem 1rem">♻️ Reciclar</a>
    <a href="beneficios.html"          class="btn-login" style="text-decoration:none;font-size:0.85rem;padding:0.5rem 1rem">🎁 Beneficios</a>
    <a href="mapa.html"                class="btn-login" style="text-decoration:none;font-size:0.85rem;padding:0.5rem 1rem">📍 Mapa</a>
  </nav>

  <div style="width:100%;margin-top:1rem">
    <h3 style="margin-bottom:0.75rem;font-size:1rem">Historial reciente</h3>
    <div id="historial">
      <p style="color:#888;font-size:0.85rem">Cargando historial...</p>
    </div>
  </div>

  <button onclick="cerrarSesion()" style="margin-top:1.5rem;background:none;border:1px solid #ccc;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;color:#666;width:100%">
    Cerrar sesión
  </button>
</div>

<!-- Modal Editar Reciclaje -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <h3>✏️ Editar Reciclaje</h3>
    <input type="hidden" id="edit-id">

    <label>Tipo de Material</label>
    <select id="edit-material">
      <option value="Plástico">Plástico</option>
      <option value="Vidrio">Vidrio</option>
      <option value="Papel">Papel</option>
      <option value="Cartón">Cartón</option>
      <option value="Metal">Metal</option>
    </select>

    <label>Cantidad (Kg)</label>
    <input type="number" id="edit-cantidad" min="0.1" step="0.1">

    <label>Observaciones</label>
    <textarea id="edit-observaciones" rows="2" placeholder="Comentario opcional"></textarea>

    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const token   = localStorage.getItem("token")
  const usuario = JSON.parse(localStorage.getItem("usuario") || "null")
  if (!token || !usuario) window.location.href = "index.html"

  document.getElementById("saludo").textContent        = "Hola, " + usuario.nombre + " 👋"
  document.getElementById("puntos-display").textContent = usuario.puntos_totales + " puntos"

  // ── Cargar historial ──────────────────────────────────────
  async function cargarHistorial() {
    try {
      const res  = await fetch("/api/historial", {
        headers: { "Authorization": "Bearer " + token }
      })
      const data = await res.json()

      if (!res.ok) { if (res.status === 401) { cerrarSesion(); return; } throw new Error(data.mensaje) }

      const contenedor = document.getElementById("historial")

      if (data.length === 0) {
        contenedor.innerHTML = "<p style='color:#888;font-size:0.85rem'>Aún no tienes reciclajes registrados.</p>"
        return
      }

      contenedor.innerHTML = data.slice(0, 5).map(h => `
        <div class="beneficio" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1">
            <strong>${h.tipo_material}</strong>
            <p style="font-size:0.78rem;color:#888;margin:2px 0">${h.nombre_punto || "Punto limpio"}</p>
            <p style="font-size:0.75rem;color:#aaa">${new Date(h.fecha_actividad).toLocaleDateString("es-CL")} · ${h.cantidad || "—"} kg</p>
            ${h.observaciones ? `<p style="font-size:0.75rem;color:#999;margin:2px 0">${h.observaciones}</p>` : ""}
            <button class="btn-editar" onclick="abrirEditar('${h._id}','${h.tipo_material}',${h.cantidad||0},'${h.observaciones||""}')">
              ✏️ Editar
            </button>
          </div>
          <span style="color:#2E8B57;font-weight:700;white-space:nowrap">+${h.puntos_ganados} pts</span>
        </div>
      `).join("")

    } catch (err) {
      document.getElementById("historial").innerHTML = "<p style='color:#888;font-size:0.85rem'>No se pudo cargar el historial.</p>"
    }
  }

  // ── Actualizar puntos ─────────────────────────────────────
  async function actualizarPuntos() {
    try {
      const res  = await fetch("/perfil", { headers: { "Authorization": "Bearer " + token } })
      const data = await res.json()
      if (res.ok) {
        document.getElementById("puntos-display").textContent = data.puntos_totales + " puntos"
        usuario.puntos_totales = data.puntos_totales
        localStorage.setItem("usuario", JSON.stringify(usuario))
      }
    } catch {}
  }

  // ── Modal editar ──────────────────────────────────────────
  function abrirEditar(id, material, cantidad, observaciones) {
    document.getElementById("edit-id").value            = id
    document.getElementById("edit-material").value      = material
    document.getElementById("edit-cantidad").value      = cantidad
    document.getElementById("edit-observaciones").value = observaciones
    document.getElementById("modal-editar").classList.add("show")
  }

  function cerrarModal() {
    document.getElementById("modal-editar").classList.remove("show")
  }

  async function guardarEdicion() {
    const id           = document.getElementById("edit-id").value
    const tipo_material= document.getElementById("edit-material").value
    const cantidad     = parseFloat(document.getElementById("edit-cantidad").value)
    const observaciones= document.getElementById("edit-observaciones").value

    if (!cantidad || cantidad <= 0) {
      toast("✗ Ingresa una cantidad válida")
      return
    }

    try {
      const res  = await fetch("/api/historial/" + id, {
        method:  "PUT",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body:    JSON.stringify({ tipo_material, cantidad, observaciones })
      })
      const data = await res.json()

      if (res.ok) {
        cerrarModal()
        toast("✓ " + data.mensaje)
        cargarHistorial()
        actualizarPuntos()
      } else {
        toast("✗ " + data.mensaje)
      }
    } catch {
      toast("✗ Error de conexión")
    }
  }

  // ── Cerrar modal al hacer clic fuera ──────────────────────
  document.getElementById("modal-editar").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-editar")) cerrarModal()
  })

  function toast(msg) {
    const t = document.getElementById("toast")
    t.textContent  = msg
    t.style.display = "block"
    setTimeout(() => t.style.display = "none", 3000)
  }

  function cerrarSesion() {
    localStorage.removeItem("token")
    localStorage.removeItem("usuario")
    window.location.href = "index.html"
  }

  cargarHistorial()
  actualizarPuntos()
</script>
</body>
</html>
