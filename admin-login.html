<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador - CiviLoop Chile</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="auth-container">

    <div class="logo">
        🛠️
    </div>

    <h1>CiviLoop <span>Chile</span></h1>

    <p class="subtitulo">
        Acceso Administrador
    </p>

    <form id="loginForm">

        <label>Correo Administrador</label>
        <input
            type="email"
            id="correo"
            placeholder="admin@civiloop.cl"
            required>

        <label>Contraseña</label>
        <input
            type="password"
            id="password"
            placeholder="********"
            required>

        <button
            type="submit"
            class="btn-login">
            Ingresar
        </button>

    </form>

    <a href="index.html">
        ← Volver al Login
    </a>

</div>

<script src="login.js"></script>

</body>
</html>
